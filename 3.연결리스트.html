<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연결 리스트 끝말잇기</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #list-container { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; margin-top: 40px; gap: 10px; }
        .node { background: #3498db; color: white; padding: 15px; border-radius: 5px; cursor: pointer; min-width: 80px; position: relative; }
        .node:hover { background: #2980b9; }
        .node .next-info { font-size: 10px; color: #d0e4f2; margin-top: 5px; }
        .arrow { font-size: 20px; color: #95a5a6; }
        input { padding: 8px; border: 1px solid #ddd; }
        button { padding: 8px 15px; background: #2ecc71; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔗 끝말잇기 연결 리스트 실습</h1>
    <div class="controls">
        <input type="text" id="wordInput" placeholder="단어 입력">
        <button onclick="addWord()">뒤에 붙이기</button>
        <p style="font-size: 13px; color: #666;">단어를 클릭하면 <b>삭제</b>하거나 그 자리에 <b>새 단어를 삽입</b>합니다.</p>
    </div>
    <div id="list-container"></div>

    <script>
        let list = ["사과", "과자"];
        function render() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            list.forEach((word, i) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.innerHTML = `<div>${word}</div><div class="next-info">Next: ${list[i+1] || 'NULL'}</div>`;
                node.onclick = () => {
                    if(confirm(`'${word}'를 삭제할까요?\n(취소 누르면 뒤에 삽입)`)) {
                        list.splice(i, 1);
                    } else {
                        const newWord = prompt("끼워넣을 단어:");
                        if(newWord) list.splice(i + 1, 0, newWord);
                    }
                    render();
                };
                container.appendChild(node);
                if(i < list.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = 'arrow';
                    arrow.innerText = '→';
                    container.appendChild(arrow);
                }
            });
        }
        function addWord() {
            const input = document.getElementById('wordInput');
            if(input.value) { list.push(input.value); input.value = ''; render(); }
        }
        render();
    </script>
</body>
</html>
