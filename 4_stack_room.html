<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 복합 암호 자물쇠</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .lock-container {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            text-align: center;
            width: 400px;
            border: 2px solid #555;
        }
        h2 {
            color: #d4af37; /* 금색 */
            margin-bottom: 20px;
        }
        p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            font-size: 18px;
            background-color: #111;
            color: #00ff00; /* 해커 느낌의 초록색 */
            border: 1px solid #444;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #b5952f;
        }
        #result-message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
            min-height: 24px;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

    <div class="lock-container">
        <h2>🔒 복합 암호 자물쇠</h2>
        <p>알파벳과 기호가 섞인 암호를 입력하세요.<br>단, 모든 괄호의 짝이 맞아야 열립니다.</p>
        
        <input type="text" id="cipher-input" placeholder="예: (a + [b * {c - d}])" autocomplete="off">
        <button onclick="checkCipher()">해제 시도</button>
        
        <div id="result-message"></div>
    </div>

    <script>
        function checkCipher() {
            const input = document.getElementById('cipher-input').value;
            const resultDiv = document.getElementById('result-message');
            
            // 입력값이 없을 때
            if (!input.trim()) {
                resultDiv.innerHTML = "<span class='error'>암호문을 입력해주세요.</span>";
                return;
            }

            const validationResult = unlockEscapeRoom(input);

            if (validationResult.success) {
                resultDiv.innerHTML = "<span class='success'>✅ 찰칵! 자물쇠가 열렸습니다.</span>";
            } else {
                resultDiv.innerHTML = `<span class='error'>❌ 해제 실패: ${validationResult.reason}</span>`;
            }
        }

        function unlockEscapeRoom(keySequence) {
            const stack = [];
            const bracketPairs = { ')': '(', '}': '{', ']': '[' };

            for (let char of keySequence) {
                // 1. 열린 괄호는 스택에 Push
                if (char === '(' || char === '{' || char === '[') {
                    stack.push(char);
                } 
                // 2. 닫힌 괄호를 만나면 검증 시작
                else if (char === ')' || char === '}' || char === ']') {
                    if (stack.length === 0) {
                        return { success: false, reason: "열린 괄호 부족 (짝이 없는 닫힌 괄호 발견)" };
                    }
                    
                    const topBracket = stack.pop();
                    if (topBracket !== bracketPairs[char]) {
                        return { success: false, reason: "짝이 맞지 않거나 교차된 괄호" };
                    }
                }
                // 3. 괄호가 아닌 일반 문자(a, b, +, * 등)는 무시하고 그대로 Pass!
            }

            // 모든 검사 후 스택에 열린 괄호가 남아있다면
            if (stack.length > 0) {
                return { success: false, reason: "닫힌 괄호 부족 (닫히지 않은 괄호가 남음)" };
            }

            return { success: true };
        }
    </script>
</body>
</html>
