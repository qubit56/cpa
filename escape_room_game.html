<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STACK ESCAPE — 탈출의 미로</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #2a2a3a;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
    --text: #d0c8b0;
    --dim: #5a5560;
    --glow: rgba(201,168,76,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 4px;
  }
  #timer-box {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    color: var(--gold2);
    background: #1a1a22;
    padding: 4px 14px;
    border: 1px solid var(--gold);
    border-radius: 4px;
  }
  #stack-display {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
  }
  .stack-item {
    background: #1e1e2a;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
    color: var(--gold);
    font-size: 0.7rem;
  }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT: MAP ── */
  #map-panel {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #map-panel h2 {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .room-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: #0d0d14;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .room-btn:hover:not(.locked) {
    border-color: var(--gold);
    background: var(--glow);
  }
  .room-btn.current {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }
  .room-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .room-btn.cleared {
    border-color: var(--green);
    opacity: 0.7;
  }
  .room-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--gold);
    width: 20px;
  }
  .room-name {
    font-size: 0.72rem;
    color: var(--text);
    flex: 1;
  }
  .room-icon { font-size: 0.9rem; }

  /* ── CENTER: SCENE ── */
  #scene-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  #scene-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    letter-spacing: 2px;
    text-align: center;
  }
  #scene-desc {
    font-size: 0.8rem;
    color: var(--dim);
    text-align: center;
    max-width: 480px;
    margin-bottom: 16px;
    line-height: 1.7;
  }

  #scene-svg-wrap {
    width: 100%;
    max-width: 520px;
    aspect-ratio: 4/3;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #060608;
    position: relative;
    cursor: pointer;
  }
  #scene-svg-wrap svg {
    width: 100%;
    height: 100%;
  }

  /* clickable hotspots */
  .hotspot {
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .hotspot:hover { opacity: 0.7; }

  /* ── PUZZLE OVERLAY ── */
  #puzzle-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #puzzle-overlay.show { display: flex; }
  #puzzle-box {
    background: var(--panel);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 28px 32px;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 0 40px rgba(201,168,76,0.2);
    position: relative;
  }
  #puzzle-title {
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  #puzzle-desc {
    font-size: 0.78rem;
    color: var(--dim);
    margin-bottom: 18px;
    line-height: 1.7;
  }
  #puzzle-input {
    width: 100%;
    background: #0a0a12;
    border: 1px solid var(--border);
    color: var(--gold2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    padding: 10px 14px;
    border-radius: 6px;
    text-align: center;
    letter-spacing: 6px;
    margin-bottom: 12px;
    outline: none;
  }
  #puzzle-input:focus { border-color: var(--gold); }
  .puzzle-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
  }
  .btn-confirm { background: var(--gold); color: #0a0a0f; font-weight: 700; }
  .btn-confirm:hover { background: var(--gold2); }
  .btn-cancel { background: #1a1a22; color: var(--dim); border: 1px solid var(--border); }
  .btn-cancel:hover { color: var(--text); }
  #puzzle-msg { font-size: 0.78rem; text-align: center; margin-top: 4px; min-height: 18px; }

  /* ── RIGHT: HINTS ── */
  #hint-panel {
    width: 200px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  #hint-panel h2 {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .hint-item {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.72rem;
    line-height: 1.6;
    animation: fadeIn 0.4s;
  }
  .hint-item .hint-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    display: block;
    margin-bottom: 3px;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

  /* ── BOTTOM: ACTIONS ── */
  #action-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  .action-btn {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #1a1a22;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn.primary { background: var(--gold); color: #0a0a0f; border-color: var(--gold); font-weight: 700; }
  .action-btn.primary:hover { background: var(--gold2); }

  /* ── CLEAR OVERLAY ── */
  #clear-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }
  #clear-overlay.show { display: flex; }
  #clear-overlay h1 { font-size: 2.5rem; color: var(--gold); letter-spacing: 6px; }
  #clear-overlay p { color: var(--dim); font-size: 0.9rem; line-height: 2; }

  #intro-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
    padding: 30px;
  }
  #intro-overlay h1 { font-size: 2rem; color: var(--gold); letter-spacing: 6px; }
  #intro-overlay p { color: var(--dim); font-size: 0.85rem; line-height: 2; max-width: 440px; }

  .tag-badge {
    display: inline-block;
    background: #1a1a22;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro-overlay">
  <span class="tag-badge">STACK-BASED ESCAPE GAME</span>
  <h1>STACK ESCAPE</h1>
  <p>
    당신은 지하 연구소의 미로에 갇혔습니다.<br>
    10개의 방을 순서대로 탈출해야 합니다.<br><br>
    각 방의 <strong style="color:var(--gold)">금고</strong>를 열어 힌트를 수집하고,<br>
    문의 암호를 풀어 다음 방으로 이동하세요.<br><br>
    <span style="font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--dim)">
    방문 기록은 STACK으로 관리됩니다 — 뒤로가기 가능
    </span>
  </p>
  <button class="action-btn primary" onclick="startGame()" style="padding:12px 40px;font-size:1rem">
    탈출 시작
  </button>
</div>

<!-- HEADER -->
<div id="header">
  <h1>⬡ STACK ESCAPE</h1>
  <div id="timer-box">00:00</div>
  <div id="stack-display">
    <span style="color:var(--dim);font-size:0.7rem">STACK:</span>
    <span id="stack-items"></span>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- MAP -->
  <div id="map-panel">
    <h2>▸ 방 목록</h2>
    <div id="room-list"></div>
  </div>

  <!-- SCENE -->
  <div id="scene-panel">
    <div id="scene-title">방을 선택하세요</div>
    <div id="scene-desc"></div>
    <div id="scene-svg-wrap">
      <svg id="main-svg" viewBox="0 0 520 390" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!-- HINTS -->
  <div id="hint-panel">
    <h2>🔑 수집된 힌트</h2>
    <div id="hint-list"></div>
  </div>
</div>

<!-- ACTION BAR -->
<div id="action-bar">
  <button class="action-btn" onclick="goBack()">← 뒤로가기 (POP)</button>
  <button class="action-btn" id="safe-btn" onclick="openSafe()" style="display:none">🔒 금고 열기</button>
  <button class="action-btn primary" id="exit-btn" onclick="tryExit()" style="display:none">🚪 문 열기 (다음 방)</button>
</div>

<!-- PUZZLE OVERLAY -->
<div id="puzzle-overlay">
  <div id="puzzle-box">
    <div id="puzzle-title">🔐 암호 입력</div>
    <div id="puzzle-desc"></div>
    <input id="puzzle-input" type="text" maxlength="6" placeholder="????">
    <button class="puzzle-btn btn-confirm" onclick="submitPuzzle()">확인</button>
    <button class="puzzle-btn btn-cancel" onclick="closePuzzle()">취소</button>
    <div id="puzzle-msg"></div>
  </div>
</div>

<!-- CLEAR OVERLAY -->
<div id="clear-overlay">
  <h1>🏆 탈출 성공!</h1>
  <p id="clear-msg"></p>
  <button class="action-btn primary" onclick="location.reload()" style="padding:12px 36px">다시 시작</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  GAME DATA — 10 Rooms
// ═══════════════════════════════════════════════
const ROOMS = [
  {
    id: 1, name: "입구 홀",  icon: "🚪",
    desc: "먼지 쌓인 대형 홀. 정면에 육중한 문이 보인다. 벽에는 낡은 시계가 걸려 있다.",
    safeHint: { tag: "힌트 #1", text: "시계 바늘은 3시 15분을 가리킨다. 숫자를 기억하라." },
    safeCode: "1988",
    safeClue: "금고 뒤편의 먼지 속에서 종이를 발견했다 — '개관년도: 1988'",
    exitCode: "0315",
    exitClue: "시계의 시·분 → 0315",
    bgColor: "#0e0c08",
    drawScene: (svg) => {
      svg.innerHTML = `
        <defs>
          <radialGradient id="rg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#1a1508"/><stop offset="100%" stop-color="#050503"/></radialGradient>
          <filter id="glow1"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="520" height="390" fill="url(#rg1)"/>
        <!-- floor -->
        <rect x="0" y="300" width="520" height="90" fill="#0a0805"/>
        <line x1="0" y1="300" x2="520" y2="300" stroke="#2a2010" stroke-width="2"/>
        <!-- wall tiles -->
        ${[0,1,2,3,4].map(i=>`<rect x="${i*104}" y="0" width="104" height="300" fill="none" stroke="#1a1608" stroke-width="1"/>`).join('')}
        ${[0,1,2].map(i=>`<line x1="0" y1="${i*100}" x2="520" y2="${i*100}" stroke="#1a1608" stroke-width="1"/>`).join('')}
        <!-- door frame -->
        <rect x="200" y="120" width="120" height="180" fill="#080605" stroke="#c9a84c" stroke-width="2"/>
        <rect x="210" y="130" width="100" height="160" fill="#0a0806"/>
        <circle cx="300" cy="210" r="6" fill="#c9a84c" filter="url(#glow1)"/>
        <!-- clock -->
        <circle cx="80" cy="80" r="40" fill="#0d0b08" stroke="#4a3a20" stroke-width="3"/>
        <circle cx="80" cy="80" r="35" fill="#0e0c09"/>
        ${[...Array(12)].map((_,i)=>{const a=i*30*Math.PI/180;return `<line x1="${80+28*Math.sin(a)}" y1="${80-28*Math.cos(a)}" x2="${80+32*Math.sin(a)}" y2="${80-32*Math.cos(a)}" stroke="#4a3a20" stroke-width="2"/>`}).join('')}
        <!-- hour 3 -->
        <line x1="80" y1="80" x2="104" y2="80" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
        <!-- minute 15 -->
        <line x1="80" y1="80" x2="80" y2="52" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
        <circle cx="80" cy="80" r="3" fill="#c9a84c"/>
        <text x="80" y="105" text-anchor="middle" fill="#4a3a20" font-size="8" font-family="monospace">CLOCK</text>
        <!-- safe -->
        <rect x="390" y="200" width="90" height="70" rx="4" fill="#0d0b08" stroke="#4a3a20" stroke-width="2" class="hotspot" onclick="openSafe()"/>
        <circle cx="435" cy="235" r="18" fill="#0a0805" stroke="#4a3a20" stroke-width="2"/>
        <circle cx="435" cy="235" r="12" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <circle cx="435" cy="235" r="4" fill="#c9a84c"/>
        <text x="435" y="282" text-anchor="middle" fill="#4a3a20" font-size="9" font-family="monospace">SAFE</text>
        <!-- candles -->
        <rect x="150" y="270" width="8" height="30" fill="#d4c080"/>
        <ellipse cx="154" cy="268" rx="4" ry="7" fill="#ff8820" opacity="0.8"/>
        <rect x="362" y="270" width="8" height="30" fill="#d4c080"/>
        <ellipse cx="366" cy="268" rx="4" ry="7" fill="#ff8820" opacity="0.8"/>
      `;
    }
  },
  {
    id: 2, name: "도서관",  icon: "📚",
    desc: "가득 찬 책장들 사이로 좁은 통로가 나 있다. 어딘가에 금고가 숨겨져 있다.",
    safeHint: { tag: "힌트 #2", text: "셰익스피어 전집 4권. 붉은 표지의 7번째 책." },
    safeCode: "4747",
    safeClue: "책 사이에서 쪽지 — '4·7·4·7'",
    exitCode: "0315",
    exitClue: "힌트 조합: Room1(0315) ← 이미 알고 있다",
    bgColor: "#080c08",
    drawScene: (svg) => {
      svg.innerHTML = `
        <defs><radialGradient id="rg2" cx="50%" cy="60%"><stop offset="0%" stop-color="#0e1008"/><stop offset="100%" stop-color="#040604"/></radialGradient></defs>
        <rect width="520" height="390" fill="url(#rg2)"/>
        <rect x="0" y="310" width="520" height="80" fill="#060806"/>
        <!-- bookshelves -->
        ${[0,1,2,3].map(shelf=>`
          <rect x="${shelf*130}" y="20" width="120" height="280" fill="#0a0c08" stroke="#1a2012" stroke-width="1"/>
          ${[0,1,2,3,4].map(row=>`
            ${[0,1,2,3,4,5,6].map(col=>{
              const colors=['#8B3A3A','#3A5A8B','#3A7A3A','#6B5A2A','#5A3A6B','#7A5A3A','#8B6A3A'];
              const c=colors[(shelf*7+row*7+col)%7];
              return `<rect x="${shelf*130+6+col*16}" y="${30+row*50}" width="14" height="${30+Math.floor(Math.random()*15)}" fill="${c}" rx="1"/>`;
            }).join('')}
          `).join('')}
        `).join('')}
        <!-- hidden safe behind book -->
        <rect x="60" y="120" width="60" height="45" rx="3" fill="#0d0e08" stroke="#3a5a2a" stroke-width="2" class="hotspot" onclick="openSafe()"/>
        <circle cx="90" cy="142" r="14" fill="#080a06" stroke="#3a5a2a" stroke-width="1.5"/>
        <circle cx="90" cy="142" r="9" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <circle cx="90" cy="142" r="3" fill="#c9a84c"/>
        <text x="90" y="178" text-anchor="middle" fill="#3a5a2a" font-size="8" font-family="monospace">SAFE</text>
        <!-- lamp -->
        <rect x="240" y="290" width="10" height="30" fill="#3a3020"/>
        <ellipse cx="245" cy="285" rx="25" ry="12" fill="#4a3a10" opacity="0.8"/>
        <ellipse cx="245" cy="285" rx="18" ry="8" fill="#ff9920" opacity="0.3"/>
        <!-- door -->
        <rect x="440" y="160" width="70" height="150" fill="#060806" stroke="#c9a84c" stroke-width="1.5"/>
        <circle cx="503" cy="235" r="5" fill="#c9a84c"/>
      `;
    }
  },
  {
    id: 3, name: "실험실",  icon: "🧪",
    desc: "각종 시약병이 선반을 가득 채웠다. 중앙의 실험대 위에 노트가 펼쳐져 있다.",
    safeHint: { tag: "힌트 #3", text: "빨강+파랑=보라. 녹색+빨강=노랑. 수식의 순서대로." },
    safeCode: "2314",
    safeClue: "노트 안쪽: 시약 번호 2-3-1-4",
    exitCode: "2314",
    exitClue: "시약 조합 번호 → 2314",
    bgColor: "#080810",
    drawScene: (svg) => {
      const bottles = [
        {x:60, c:'#c0392b', l:'①'},{x:110,c:'#2980b9',l:'②'},{x:160,c:'#27ae60',l:'③'},
        {x:210,c:'#8e44ad',l:'④'},{x:260,c:'#e67e22',l:'⑤'},{x:310,c:'#f1c40f',l:'⑥'}
      ];
      svg.innerHTML = `
        <defs><radialGradient id="rg3" cx="50%" cy="30%"><stop offset="0%" stop-color="#0c0c18"/><stop offset="100%" stop-color="#040408"/></radialGradient></defs>
        <rect width="520" height="390" fill="url(#rg3)"/>
        <rect x="0" y="300" width="520" height="90" fill="#060610"/>
        <!-- shelves -->
        <rect x="20" y="80" width="480" height="10" fill="#1a1a2a"/>
        <rect x="20" y="180" width="480" height="10" fill="#1a1a2a"/>

// ═══════════════════════════════════════════════
//  STACK ENGINE
// ═══════════════════════════════════════════════
class RoomStack {
  constructor() { this._stack = []; }
  push(id) { this._stack.push(id); }
  pop() { return this._stack.length > 1 ? this._stack.pop() : null; }
  peek() { return this._stack[this._stack.length - 1] ?? null; }
  has(id) { return this._stack.includes(id); }
  size() { return this._stack.length; }
  toArray() { return [...this._stack]; }
}

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
const state = {
  stack: new RoomStack(),
  hints: [],
  cleared: new Set(),
  safeOpened: new Set(),
  currentPuzzle: null, // 'safe' | 'exit'
  timerInterval: null,
  seconds: 0,
  started: false
};

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderRoomList() {
  const cur = state.stack.peek();
  const list = document.getElementById('room-list');
  list.innerHTML = ROOMS.map(r => {
    const locked = r.id > 1 && !state.cleared.has(r.id - 1) && !state.cleared.has(r.id);
    const current = r.id === cur;
    const cleared = state.cleared.has(r.id);
    return `<div class="room-btn ${locked?'locked':''} ${current?'current':''} ${cleared?'cleared':''}"
      onclick="${locked?'':'enterRoom('+r.id+')'}">
      <span class="room-num">${String(r.id).padStart(2,'0')}</span>
      <span class="room-name">${r.name}</span>
      <span class="room-icon">${cleared?'✅':r.icon}</span>
    </div>`;
  }).join('');
}

function renderScene(roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  if (!room) return;
  document.getElementById('scene-title').textContent = `[${String(room.id).padStart(2,'0')}] ${room.name}`;
  document.getElementById('scene-desc').textContent = room.desc;
  const svg = document.getElementById('main-svg');
  room.drawScene(svg);
  // show/hide buttons
  document.getElementById('safe-btn').style.display = state.safeOpened.has(roomId) ? 'none' : 'inline-block';
  document.getElementById('exit-btn').style.display = 'inline-block';
}

function renderStack() {
  const arr = state.stack.toArray();
  document.getElementById('stack-items').innerHTML =
    arr.map(id => `<span class="stack-item">${String(id).padStart(2,'0')}</span>`).join(' → ');
}

function renderHints() {
  const list = document.getElementById('hint-list');
  list.innerHTML = state.hints.map(h =>
    `<div class="hint-item"><span class="hint-tag">${h.tag}</span>${h.text}</div>`
  ).join('');
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════
function startGame() {
  document.getElementById('intro-overlay').style.display = 'none';
  state.started = true;
  enterRoom(1);
  state.timerInterval = setInterval(() => {
    state.seconds++;
    const m = String(Math.floor(state.seconds/60)).padStart(2,'0');
    const s = String(state.seconds%60).padStart(2,'0');
    document.getElementById('timer-box').textContent = `${m}:${s}`;
  }, 1000);
}

function enterRoom(id) {
  if (!state.started) return;
  const room = ROOMS.find(r=>r.id===id);
  const cur = state.stack.peek();
  // prevent re-entering same
  if (cur === id) return;
  // check locked
  if (id > 1 && !state.cleared.has(id-1) && !state.cleared.has(id)) return;
  state.stack.push(id);
  renderScene(id);
  renderStack();
  renderRoomList();
}

function goBack() {
  if (state.stack.size() <= 1) { alert('더 이상 뒤로 갈 수 없습니다.'); return; }
  state.stack.pop();
  const prev = state.stack.peek();
  renderScene(prev);
  renderStack();
  renderRoomList();
}

function openSafe() {
  const cur = state.stack.peek();
  if (!cur) return;
  if (state.safeOpened.has(cur)) { showMsg('이미 열린 금고입니다.'); return; }
  const room = ROOMS.find(r=>r.id===cur);
  state.currentPuzzle = 'safe';
  showPuzzle(`금고 — ${room.name}`, `금고를 열 4자리 코드를 입력하세요.\n\n💡 ${room.safeClue}`, '');
}

function tryExit() {
  const cur = state.stack.peek();
  if (!cur) return;
  if (state.cleared.has(cur)) {
    if (cur < 10) { enterRoom(cur+1); return; }
    else { showClear(); return; }
  }
  const room = ROOMS.find(r=>r.id===cur);
  state.currentPuzzle = 'exit';
  showPuzzle(`문 열기 — ${room.name}`, `탈출 코드를 입력하세요.\n\n🔒 힌트: ${room.exitClue}`, '');
}

// ═══════════════════════════════════════════════
//  PUZZLE
// ═══════════════════════════════════════════════
function showPuzzle(title, desc, val) {
  document.getElementById('puzzle-title').textContent = title;
  document.getElementById('puzzle-desc').textContent = desc;
  document.getElementById('puzzle-input').value = val;
  document.getElementById('puzzle-msg').textContent = '';
  document.getElementById('puzzle-msg').style.color = '';
  document.getElementById('puzzle-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('puzzle-input').focus(), 100);
}

function closePuzzle() {
  document.getElementById('puzzle-overlay').classList.remove('show');
  state.currentPuzzle = null;
}

function submitPuzzle() {
  const val = document.getElementById('puzzle-input').value.trim();
  const cur = state.stack.peek();
  const room = ROOMS.find(r=>r.id===cur);
  const msg = document.getElementById('puzzle-msg');

  if (state.currentPuzzle === 'safe') {
    if (val === room.safeCode) {
      state.safeOpened.add(cur);
      state.hints.push(room.safeHint);
      renderHints();
      msg.style.color = '#27ae60';
      msg.textContent = '✅ 금고가 열렸습니다! 힌트를 획득했습니다.';
      document.getElementById('safe-btn').style.display = 'none';
      setTimeout(closePuzzle, 1200);
    } else {
      msg.style.color = '#c0392b';
      msg.textContent = '❌ 코드가 틀렸습니다.';
    }
  } else if (state.currentPuzzle === 'exit') {
    if (val === room.exitCode) {
      state.cleared.add(cur);
      msg.style.color = '#27ae60';
      msg.textContent = cur < 10 ? '🚪 문이 열렸습니다! 다음 방으로...' : '🏆 최종 탈출 성공!';
      renderRoomList();
      setTimeout(() => {
        closePuzzle();
        if (cur < 10) enterRoom(cur+1);
        else showClear();
      }, 1000);
    } else {
      msg.style.color = '#c0392b';
      msg.textContent = '❌ 코드가 틀렸습니다.';
    }
  }
}

function showClear() {
  clearInterval(state.timerInterval);
  const m = String(Math.floor(state.seconds/60)).padStart(2,'0');
  const s = String(state.seconds%60).padStart(2,'0');
  document.getElementById('clear-msg').innerHTML =
    `탈출 완료!<br>소요 시간: ${m}분 ${s}초<br>수집한 힌트: ${state.hints.length}개<br>방문한 방: ${state.stack.size()}회`;
  document.getElementById('clear-overlay').classList.add('show');
}

function showMsg(t) { alert(t); }

// keyboard support
document.getElementById('puzzle-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPuzzle();
  if (e.key === 'Escape') closePuzzle();
});

// init room list on load
renderRoomList();
</script>
