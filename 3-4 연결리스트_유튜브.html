<!DOCTYPE html>
<html>
<head>
    <title>유튜브 연결 리스트 플레이어 (Embed 방식)</title>
<meta charset="UTF-8">
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #player-container { margin: 20px auto; width: 640px; height: 360px; border: 5px solid #1db954; border-radius: 10px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #1db954; color: white; border: none; border-radius: 5px; margin: 0 5px; }
        button:hover { background: #1aa34a; }
        .info { font-family: monospace; color: #1db954; background: #222; padding: 15px; margin-top: 30px; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>📺 YouTube Linked Player (Embed)</h2>
    
    <div id="player-container">
        <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <button onclick="playPrev()">⏮ 이전 곡</button>
        <button onclick="playNext()">다음 곡 ⏭</button>
    </div>

    <div class="info" id="status">Head -> Song1 -> Song2 -> Song3 -> NULL</div>

    <script>
        // 1. 유튜브 영상 ID 노드 리스트
        // (저작권 때문에 외부 재생이 막힌 영상이 있을 수 있으니 확인된 ID를 사용하세요)
        const videoList = ["aqz-KE-bpKQ", "I58Wr2ayugk", "tiKFuzpX-NA"]; 
        let currentIdx = 0;

        const playerIframe = document.getElementById('main-player');

        // 2. 영상을 교체하는 핵심 함수 (Embed 주소 방식)
        function updateVideo() {
            const videoId = videoList[currentIdx];
            // 유튜브 임베드 전용 주소 형식: https://www.youtube.com/embed/[ID]?autoplay=1
            playerIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            updateStatus();
        }

        function playNext() {
            currentIdx = (currentIdx + 1) % videoList.length;
            updateVideo();
        }

        function playPrev() {
            currentIdx = (currentIdx - 1 + videoList.length) % videoList.length;
            updateVideo();
        }

        function updateStatus() {
            let text = "";
            videoList.forEach((v, i) => {
                text += (i === currentIdx) ? `[${v}]*` : v;
                if(i < videoList.length - 1) text += " -> ";
            });
            document.getElementById('status').innerText = text + " -> NULL";
        }

        // 페이지 로드 시 첫 번째 영상 실행
        window.onload = updateVideo;
    </script>
</body>
</html>
